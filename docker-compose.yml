version: '3.9'

services:
  postgres:
    image: postgres:17.9-alpine3.23
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: efe1884b943209bd4a540fea6540532017418ef7
      POSTGRES_USER: major-adm
      POSTGRES_DB: major
    ports:
      - "6432:5432"
    volumes:
      - "./postgres:/var/lib/postgresql/data"

  redis:
    image: redis:8.6-alpine3.23
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=d2a88406608e9c67c83d17d9a8bd9e009152ffea
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - ./minio:/data
