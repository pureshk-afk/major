{% load static %}

<link type="text/css" rel="stylesheet" href="{% static 'web/css/card_review.css' %}">



{% block cardReview %}
<script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
<div class="feedback">
    <h2>Отзывы</h2>
    <div id="feedback-slider">
      <div class="swiper-wrapper feedback__wrapper">
        {% for r in reviews %}
        <div class="feedback__item swiper-slide">
          <p>{{ reviews.description }}</p>
          <p>{{ reviews.name }}</p>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>

{% endblock cardReview %}

<script type="module" src="{% static 'web/js/reviewSlider.js' %}"></script>
