{% load static %}
<link type="text/css" rel="stylesheet" href="{% static 'web/css/card_project.css' %}">
<div class="main_conteiner_cards">
        <div class="conteiner_cards">
            {% for p in projects%}
                <div class="card">
                    <div class="card-image" style="background-image: url('{{ p.main_image.url }}');">
                        <p class="standart-text">{{p.name}}</p>
                        <button class="white-btn"><a class="standart-text" href="{% url 'major:project_details' slug=p.slug %}" style="text-decoration: none;">Смотреть проект</a></button>
                    </div>
                    
                </div>
            {% endfor %}
        </div>
    </div>
